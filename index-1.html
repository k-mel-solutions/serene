<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sérène</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0F; --surface:#16141E; --surface2:#221E30; --surface3:#2C2740;
  --fg:#F0EBE3; --fg-muted:#8B7E97; --fg-dim:#5C5468;
  --accent:#8B7BA8; --accent-bright:#A99BC4; --accent-dim:#5A4E72;
  --gold:#C4A872; --green:#7BA88B; --rose:#A87B8B;
  --danger:#C47272;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;overflow:hidden}
html[dir="rtl"] body{font-family:'Noto Naskh Arabic','Inter',sans-serif}
button{font-family:inherit;cursor:pointer}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:640px;margin:0 auto;position:relative}

/* ============ HEADER ============ */
#header{padding:20px 20px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:breathe 3.5s ease-in-out infinite;flex-shrink:0}
@keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
#header h1{font-family:'Fraunces',serif;font-size:19px;font-weight:300;font-style:italic;letter-spacing:.02em}
#header-right{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
#lang-btn,#sos-btn{background:var(--surface);border:1px solid var(--surface3);color:var(--fg-muted);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:500;transition:all .2s}
#lang-btn:hover{color:var(--fg);border-color:var(--accent-dim)}
#sos-btn{color:var(--danger);border-color:rgba(196,114,114,.3)}
#sos-btn:hover{background:rgba(196,114,114,.12)}

/* ============ NAV ============ */
#nav{display:flex;gap:2px;padding:0 16px;flex-shrink:0;border-bottom:1px solid #1c1928}
.nav-tab{background:none;border:none;color:var(--fg-dim);padding:10px 14px;font-size:13px;font-weight:500;position:relative;transition:color .25s;white-space:nowrap}
.nav-tab.active{color:var(--fg)}
.nav-tab.active::after{content:'';position:absolute;bottom:-1px;inset-inline:14px;height:2px;background:var(--accent);border-radius:2px}
#nav{overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}

/* ============ VIEWS ============ */
.view{flex:1;overflow-y:auto;display:none;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.view.active{display:flex}
.view::-webkit-scrollbar{width:4px}
.view::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

/* ============ CHAT ============ */
#view-chat{padding:0}
#messages{flex:1;overflow-y:auto;padding:28px 22px 16px;display:flex;flex-direction:column;gap:26px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.intro-msg{text-align:center;padding:36px 20px}
.intro-msg p{font-family:'Fraunces',serif;font-size:15px;font-weight:300;font-style:italic;color:var(--fg-muted);line-height:1.85;max-width:340px;margin:0 auto}
.intro-divider{width:30px;height:1px;background:var(--accent-dim);margin:20px auto 0;opacity:.5}
.disclaimer{font-size:10.5px;color:var(--fg-dim);max-width:300px;margin:14px auto 0;line-height:1.6}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{background:var(--surface3);color:var(--fg);padding:12px 17px;border-radius:18px 18px 4px 18px;max-width:80%;font-size:14.5px;line-height:1.65}
html[dir="rtl"] .msg-user .bubble{border-radius:18px 18px 18px 4px}
.msg-ai{display:flex;flex-direction:column;align-items:flex-start;padding-inline-start:4px}
.msg-ai .response-text{font-family:'Fraunces',serif;font-size:16px;font-weight:300;line-height:1.9;color:var(--fg);max-width:88%;border-inline-start:1px solid var(--accent-dim);padding-inline-start:16px}
html[dir="rtl"] .msg-ai .response-text{font-family:'Noto Naskh Arabic',serif;font-size:17px}
.msg-ai .response-text em{font-style:italic;color:var(--accent-bright)}
.crisis-card{background:rgba(196,114,114,.08);border:1px solid rgba(196,114,114,.3);border-radius:14px;padding:16px 18px;max-width:88%;margin-top:10px}
.crisis-card h4{font-size:13px;font-weight:600;color:var(--danger);margin-bottom:8px}
.crisis-card p{font-size:13px;color:var(--fg-muted);line-height:1.6;margin-bottom:10px}
.crisis-card a{display:inline-block;color:var(--fg);background:rgba(196,114,114,.2);padding:7px 14px;border-radius:10px;font-size:13px;text-decoration:none;margin:3px 4px 3px 0}
#presence{display:none;align-items:center;gap:10px;padding:0 26px 10px}
#presence.visible{display:flex}
.candle{width:8px;display:flex;flex-direction:column;align-items:center}
.candle-flame{width:6px;height:9px;background:var(--accent);border-radius:50% 50% 40% 40%;animation:flicker 1.5s ease-in-out infinite;opacity:.85}
@keyframes flicker{0%,100%{transform:scaleY(1);opacity:.7}25%{transform:scaleY(1.12) scaleX(.9);opacity:1}50%{transform:scaleY(.95) scaleX(1.05);opacity:.8}75%{transform:scaleY(1.05) scaleX(.95);opacity:.9}}
.candle-body{width:4px;height:10px;background:var(--accent-dim);opacity:.4;border-radius:0 0 2px 2px}
.presence-text{font-size:11px;color:var(--fg-muted);font-weight:300;font-style:italic}
#input-area{padding:12px 20px calc(20px + env(safe-area-inset-bottom));flex-shrink:0;border-top:1px solid #1c1928}
#input-wrap{display:flex;align-items:flex-end;gap:12px;background:var(--surface);border:1px solid var(--surface3);border-radius:16px;padding:13px 15px;transition:border-color .2s}
#input-wrap:focus-within{border-color:var(--accent-dim)}
#input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-family:inherit;font-size:14.5px;line-height:1.6;resize:none;max-height:130px;min-height:22px;caret-color:var(--accent)}
#input::placeholder{color:var(--fg-dim);font-style:italic;font-weight:300}
#send-btn{background:none;border:none;padding:4px;color:var(--accent-dim);transition:color .2s,transform .15s;display:flex;border-radius:50%}
#send-btn:hover:not(:disabled){color:var(--accent);transform:scale(1.1)}
#send-btn:disabled{opacity:.3;cursor:default}
#send-btn svg{width:18px;height:18px}
#mic-btn{background:none;border:none;padding:4px;color:var(--accent-dim);transition:color .2s,transform .15s;display:flex;border-radius:50%;flex-shrink:0}
#mic-btn:hover{color:var(--accent);transform:scale(1.08)}
#mic-btn svg{width:18px;height:18px}
#mic-btn.recording{color:var(--danger);animation:micpulse 1.2s ease-in-out infinite}
@keyframes micpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
#voice-mode-btn{width:100%;margin-top:10px;background:none;border:1px solid var(--surface3);color:var(--fg-muted);border-radius:14px;padding:11px;font-size:12.5px;font-weight:500;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
#voice-mode-btn:hover{border-color:var(--accent-dim);color:var(--fg)}
#voice-mode-btn::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);opacity:.7}

/* VOICE OVERLAY */
#voice-overlay{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,#1a1726 0%,#0D0D0F 70%);z-index:110;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px calc(40px + env(safe-area-inset-bottom));gap:30px}
#voice-overlay.visible{display:flex}
#voice-exit{position:absolute;top:calc(20px + env(safe-area-inset-top));inset-inline-end:24px;background:var(--surface);border:1px solid var(--surface3);color:var(--fg-muted);width:38px;height:38px;border-radius:50%;font-size:15px}
#voice-exit:hover{color:var(--fg)}
#voice-orb-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
#voice-orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#A99BC4,#5A4E72 75%);box-shadow:0 0 70px rgba(139,123,168,.4);transition:transform .25s ease;z-index:2}
#voice-orb-ring{position:absolute;width:120px;height:120px;border-radius:50%;border:1px solid var(--accent);opacity:0}
#voice-overlay.listening #voice-orb{animation:orbListen 1.6s ease-in-out infinite}
#voice-overlay.listening #voice-orb-ring{animation:orbRing 1.6s ease-out infinite}
#voice-overlay.speaking #voice-orb{animation:orbSpeak .9s ease-in-out infinite}
@keyframes orbListen{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes orbSpeak{0%,100%{transform:scale(1.04)}50%{transform:scale(.94)}}
@keyframes orbRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.9);opacity:0}}
#voice-status{font-family:'Fraunces',serif;font-style:italic;font-size:17px;font-weight:300;color:var(--accent-bright);text-align:center;min-height:24px}
#voice-transcript{font-size:14px;color:var(--fg-muted);text-align:center;max-width:340px;line-height:1.7;min-height:48px;font-weight:300}
#voice-toggle{background:var(--accent-dim);border:none;color:var(--fg);border-radius:30px;padding:15px 44px;font-size:15px;font-weight:500;transition:all .25s}
#voice-toggle:hover{background:var(--accent)}
#voice-toggle.active{background:var(--danger)}
.voice-bubble{display:flex;align-items:center;gap:11px;min-width:130px}
.vb-play{background:var(--accent);border:none;color:#0D0D0F;width:32px;height:32px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vb-mic{font-size:18px}
.vb-wave{display:flex;align-items:center;gap:3px;height:24px}
.vb-wave span{width:3px;border-radius:2px;background:var(--accent-bright);opacity:.7;height:30%}
.vb-wave span:nth-child(1){height:40%}.vb-wave span:nth-child(2){height:75%}.vb-wave span:nth-child(3){height:55%}.vb-wave span:nth-child(4){height:90%}.vb-wave span:nth-child(5){height:50%}.vb-wave span:nth-child(6){height:70%}.vb-wave span:nth-child(7){height:35%}
.vb-wave.playing span{animation:wave .8s ease-in-out infinite}
.vb-wave.playing span:nth-child(2){animation-delay:.1s}.vb-wave.playing span:nth-child(3){animation-delay:.2s}.vb-wave.playing span:nth-child(4){animation-delay:.3s}.vb-wave.playing span:nth-child(5){animation-delay:.15s}.vb-wave.playing span:nth-child(6){animation-delay:.25s}.vb-wave.playing span:nth-child(7){animation-delay:.05s}
@keyframes wave{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(1.3)}}

/* ============ BREATHE ============ */
#view-breathe{align-items:center;justify-content:flex-start;padding:30px 24px 40px;gap:26px}
.breathe-title{font-family:'Fraunces',serif;font-size:20px;font-weight:300;font-style:italic;text-align:center}
.breathe-sub{font-size:13px;color:var(--fg-muted);text-align:center;max-width:300px;margin-top:-16px;line-height:1.7}
#breathe-circle-wrap{position:relative;width:240px;height:240px;display:flex;align-items:center;justify-content:center;margin:8px 0}
#breathe-ring{position:absolute;inset:0;border-radius:50%;border:1px solid var(--surface3)}
#breathe-circle{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #A99BC4, #5A4E72 70%);box-shadow:0 0 60px rgba(139,123,168,.35);transition:transform .3s ease;display:flex;align-items:center;justify-content:center}
#breathe-phase{position:absolute;bottom:-38px;width:100%;text-align:center;font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:var(--accent-bright);font-weight:300;letter-spacing:.03em}
#breathe-count{font-size:26px;font-weight:300;color:rgba(13,13,15,.75);font-family:'Fraunces',serif}
.breathe-techniques{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.tech-btn{background:var(--surface);border:1px solid var(--surface3);color:var(--fg-muted);border-radius:14px;padding:10px 16px;font-size:12.5px;transition:all .2s}
.tech-btn.active{border-color:var(--accent);color:var(--fg);background:var(--surface2)}
.tech-desc{font-size:11.5px;color:var(--fg-dim);text-align:center;max-width:280px;line-height:1.6;min-height:36px}
#breathe-start{background:var(--accent-dim);border:none;color:var(--fg);border-radius:24px;padding:13px 38px;font-size:14px;font-weight:500;transition:all .25s;margin-top:4px}
#breathe-start:hover{background:var(--accent)}
#breathe-start.running{background:var(--surface3)}

/* ============ JOURNAL ============ */
#view-journal{padding:24px 22px 40px;gap:22px}
.j-section-title{font-family:'Fraunces',serif;font-size:17px;font-weight:300;font-style:italic;margin-bottom:4px}
.mood-row{display:flex;gap:8px;justify-content:space-between}
.mood-btn{flex:1;background:var(--surface);border:1px solid var(--surface3);border-radius:14px;padding:14px 4px;font-size:24px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px}
.mood-btn span{font-size:10px;color:var(--fg-dim);font-weight:500}
.mood-btn:hover{transform:translateY(-2px)}
.mood-btn.selected{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 20px rgba(139,123,168,.15)}
#journal-text{background:var(--surface);border:1px solid var(--surface3);border-radius:14px;padding:14px 16px;color:var(--fg);font-family:inherit;font-size:14px;line-height:1.7;resize:vertical;min-height:90px;width:100%;outline:none}
#journal-text:focus{border-color:var(--accent-dim)}
.j-audio-row{display:flex;flex-direction:column;gap:10px;margin-top:-8px}
#j-audio-btn{display:flex;align-items:center;justify-content:center;gap:9px;background:var(--surface);border:1px solid var(--surface3);color:var(--fg-muted);border-radius:14px;padding:12px;font-size:13px;font-weight:500;transition:all .2s}
#j-audio-btn:hover{border-color:var(--accent-dim);color:var(--fg)}
#j-audio-btn.recording{border-color:var(--danger);color:var(--danger)}
#j-audio-btn.recording .ja-icon{animation:micpulse 1.2s ease-in-out infinite}
#j-audio-preview:empty{display:none}
#j-audio-preview .voice-bubble{display:inline-flex;align-items:center;gap:11px;background:var(--surface2);border-radius:14px;padding:11px 15px}
#journal-text::placeholder{color:var(--fg-dim);font-style:italic}
.gratitude-hint{font-size:11.5px;color:var(--fg-dim);font-style:italic;margin-top:-14px}
#journal-save{background:var(--accent-dim);border:none;color:var(--fg);border-radius:14px;padding:13px;font-size:14px;font-weight:500;transition:background .25s}
#journal-save:hover{background:var(--accent)}
#journal-save:disabled{opacity:.4;cursor:default}
#chart-wrap{background:var(--surface);border:1px solid var(--surface3);border-radius:16px;padding:18px 16px 10px}
#chart-title{font-size:12px;color:var(--fg-muted);font-weight:500;margin-bottom:12px;letter-spacing:.04em}
#mood-chart{width:100%;height:120px}
.entries-list{display:flex;flex-direction:column;gap:12px}
.entry-card{background:var(--surface);border:1px solid var(--surface3);border-radius:14px;padding:14px 16px}
.entry-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.entry-mood{font-size:18px}
.entry-date{font-size:11px;color:var(--fg-dim)}
.entry-del{margin-inline-start:auto;background:none;border:none;color:var(--fg-dim);font-size:11px;opacity:.6}
.entry-del:hover{color:var(--danger);opacity:1}
.entry-text{font-size:13.5px;color:var(--fg-muted);line-height:1.65;white-space:pre-wrap}
.empty-state{font-size:13px;color:var(--fg-dim);font-style:italic;text-align:center;padding:20px}
#storage-note{font-size:10.5px;color:var(--fg-dim);text-align:center;line-height:1.6}

/* ============ RESOURCES ============ */
#view-resources{padding:24px 22px 40px;gap:26px}
.res-section h3{font-family:'Fraunces',serif;font-size:17px;font-weight:300;font-style:italic;margin-bottom:14px}
.sound-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.library-sub{font-size:11.5px;color:var(--fg-dim);font-style:italic;line-height:1.6;margin-bottom:14px}
.track-list{display:flex;flex-direction:column;gap:10px}
.track-card{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--surface3);border-radius:14px;padding:13px 15px;transition:all .2s}
.track-card.playing{border-color:var(--accent);background:var(--surface2)}
.track-play{background:var(--accent);border:none;color:#0D0D0F;width:38px;height:38px;border-radius:50%;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.track-meta{flex:1;min-width:0}
.track-name{font-size:14px;font-weight:500;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-type{font-size:11px;color:var(--fg-dim);margin-top:2px;display:flex;align-items:center;gap:5px}
.track-type::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent-dim)}
.track-del{background:none;border:none;color:var(--fg-dim);font-size:13px;flex-shrink:0;padding:6px}
.track-del:hover{color:var(--danger)}
.track-empty{font-size:13px;color:var(--fg-dim);font-style:italic;text-align:center;padding:24px 16px;line-height:1.7}
#track-dialog{position:fixed;inset:0;background:rgba(13,13,15,.85);z-index:130;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
#track-dialog.visible{display:flex}
#track-dialog-box{background:var(--surface2);border:1px solid var(--surface3);border-radius:20px;padding:24px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px}
#td-title{font-family:'Fraunces',serif;font-size:18px;font-weight:300;font-style:italic;color:var(--fg)}
#track-dialog-box input[type=text],#track-dialog-box select{background:var(--surface);border:1px solid var(--surface3);border-radius:12px;padding:12px 14px;color:var(--fg);font-family:inherit;font-size:14px;outline:none;width:100%}
#track-dialog-box input:focus,#track-dialog-box select:focus{border-color:var(--accent-dim)}
.td-tabs{display:flex;gap:8px}
.td-tab{flex:1;background:var(--surface);border:1px solid var(--surface3);color:var(--fg-muted);border-radius:11px;padding:10px;font-size:12.5px;font-weight:500;transition:all .2s}
.td-tab.active{border-color:var(--accent);color:var(--fg);background:var(--surface3)}
#td-pick{background:var(--surface);border:1px solid var(--surface3);color:var(--fg-muted);border-radius:12px;padding:12px;font-size:13px;width:100%;transition:all .2s}
#td-pick:hover{border-color:var(--accent-dim);color:var(--fg)}
#td-filename{font-size:12px;color:var(--accent-bright);display:block;margin-top:8px;word-break:break-all}
#td-link-hint{font-size:11px;color:var(--fg-dim);line-height:1.5;margin-top:8px}
.td-actions{display:flex;gap:10px;margin-top:4px}
.td-actions button{flex:1;border-radius:12px;padding:12px;font-size:14px;font-weight:500;border:none}
#td-cancel{background:var(--surface);color:var(--fg-muted);border:1px solid var(--surface3)}
#td-save{background:var(--accent-dim);color:var(--fg)}
#td-save:hover{background:var(--accent)}
.sound-card{background:var(--surface);border:1px solid var(--surface3);border-radius:16px;padding:18px 16px;display:flex;flex-direction:column;gap:6px;transition:all .2s;text-align:start;border:none;outline:1px solid var(--surface3)}
.sound-card:hover{outline-color:var(--accent-dim)}
.sound-card.playing{outline-color:var(--accent);background:var(--surface2)}
.sound-icon{font-size:22px}
.sound-name{font-size:13px;font-weight:500;color:var(--fg)}
.sound-state{font-size:10.5px;color:var(--fg-dim)}
.poem-card{background:linear-gradient(160deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--surface3);border-radius:18px;padding:26px 24px;position:relative;overflow:hidden}
.poem-card::before{content:'';position:absolute;top:-40px;inset-inline-end:-40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(139,123,168,.12),transparent 70%)}
.poem-text{font-family:'Fraunces',serif;font-size:16.5px;font-weight:300;font-style:italic;line-height:2;color:var(--fg);white-space:pre-line}
html[dir="rtl"] .poem-text{font-family:'Noto Naskh Arabic',serif}
.poem-nav{display:flex;align-items:center;justify-content:space-between;margin-top:18px}
.poem-nav button{background:none;border:1px solid var(--surface3);color:var(--fg-muted);border-radius:50%;width:34px;height:34px;font-size:15px;transition:all .2s}
.poem-nav button:hover{color:var(--fg);border-color:var(--accent-dim)}
.poem-index{font-size:11px;color:var(--fg-dim);letter-spacing:.1em}
.art-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}

#refuge-add{margin-inline-start:auto;background:var(--surface2);border:1px solid var(--surface3);color:var(--accent-bright);width:32px;height:32px;border-radius:50%;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
#refuge-add:hover{border-color:var(--accent);background:var(--surface3)}
.refuge-hint{font-size:11.5px;color:var(--fg-dim);font-style:italic;line-height:1.6;margin-bottom:14px}
.refuge-card{flex-shrink:0;width:200px;height:260px;border-radius:18px;position:relative;overflow:hidden;background-size:cover;background-position:center;cursor:pointer}
.refuge-card .refuge-del{position:absolute;top:8px;inset-inline-end:8px;background:rgba(13,13,15,.6);border:none;color:#F0EBE3;width:28px;height:28px;border-radius:50%;font-size:13px;z-index:3;backdrop-filter:blur(4px)}
.refuge-empty{flex-shrink:0;width:200px;height:260px;border-radius:18px;border:1px dashed var(--surface3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--fg-dim);background:none;cursor:pointer;text-align:center;padding:20px}
.refuge-empty:hover{border-color:var(--accent-dim);color:var(--fg-muted)}
.refuge-empty .re-icon{font-size:28px;opacity:.6}
.refuge-empty .re-txt{font-size:12px;font-style:italic;line-height:1.5}
#img-viewer{position:fixed;inset:0;background:#000;z-index:120;display:none;flex-direction:column;align-items:center;justify-content:center;padding:0}
#img-viewer.visible{display:flex}
#img-close{position:absolute;top:calc(20px + env(safe-area-inset-top));inset-inline-end:24px;background:rgba(40,36,55,.7);border:none;color:#F0EBE3;width:40px;height:40px;border-radius:50%;font-size:16px;z-index:5;backdrop-filter:blur(6px)}
#img-content{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#img-content img{max-width:100%;max-height:100%;object-fit:contain}
#img-content .grad-full{width:100%;height:100%}
#img-caption{position:absolute;bottom:calc(40px + env(safe-area-inset-bottom));font-family:'Fraunces',serif;font-style:italic;font-size:16px;font-weight:300;color:rgba(240,235,227,.85);text-shadow:0 2px 12px rgba(0,0,0,.6);padding:0 30px;text-align:center}
.art-card{flex-shrink:0;width:200px;height:260px;border-radius:18px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.art-label{padding:14px;font-family:'Fraunces',serif;font-size:12.5px;font-style:italic;font-weight:300;color:rgba(240,235,227,.9);text-shadow:0 1px 8px rgba(0,0,0,.4);position:relative;z-index:2}
.quote-card{background:var(--surface);border-inline-start:2px solid var(--gold);border-radius:0 14px 14px 0;padding:18px 20px}
html[dir="rtl"] .quote-card{border-radius:14px 0 0 14px}
.quote-text{font-family:'Fraunces',serif;font-size:15px;font-style:italic;font-weight:300;line-height:1.85;color:var(--fg)}
.quote-refresh{background:none;border:none;color:var(--fg-dim);font-size:11px;margin-top:10px;letter-spacing:.05em}
.quote-refresh:hover{color:var(--accent)}

/* ============ SOS OVERLAY ============ */
#sos-overlay{position:fixed;inset:0;background:rgba(13,13,15,.97);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;gap:22px;overflow-y:auto}
#sos-overlay.visible{display:flex}
.sos-title{font-family:'Fraunces',serif;font-size:22px;font-weight:300;font-style:italic;text-align:center}
.sos-text{font-size:14px;color:var(--fg-muted);text-align:center;max-width:320px;line-height:1.8}
.sos-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.sos-action{background:var(--surface);border:1px solid var(--surface3);color:var(--fg);border-radius:14px;padding:15px 18px;font-size:14px;text-align:start;transition:all .2s;text-decoration:none;display:block}
.sos-action:hover{border-color:var(--accent-dim);background:var(--surface2)}
.sos-action small{display:block;font-size:11px;color:var(--fg-dim);margin-top:3px}
.sos-close{background:none;border:none;color:var(--fg-dim);font-size:13px;margin-top:8px;text-decoration:underline}
.sos-close:hover{color:var(--fg)}

/* ============ LANG MENU ============ */
#lang-menu{position:fixed;top:60px;inset-inline-end:max(16px,calc((100vw - 640px)/2 + 16px));background:var(--surface2);border:1px solid var(--surface3);border-radius:16px;padding:8px;z-index:90;display:none;flex-direction:column;min-width:160px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
#lang-menu.visible{display:flex}
.lang-opt{background:none;border:none;color:var(--fg-muted);padding:10px 14px;font-size:13px;text-align:start;border-radius:10px;transition:all .15s}
.lang-opt:hover{background:var(--surface3);color:var(--fg)}
.lang-opt.active{color:var(--accent-bright);font-weight:500}

.msg-enter{animation:fadeSlide .35s ease forwards}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:480px){
  #messages{padding:22px 16px 12px}
  #view-journal,#view-resources,#view-breathe{padding-inline:16px}
  .art-card{width:170px;height:220px}
}

<body>
<div id="app">
  <div id="header">
    <div id="status-dot"></div>
    <h1 id="app-title">Sérène</h1>
    <div id="header-right">

      <button id="sos-btn">SOS</button>
    </div>
  </div>

  <div id="nav">
    <button class="nav-tab active" data-view="chat"></button>
    <button class="nav-tab" data-view="breathe"></button>
    <button class="nav-tab" data-view="journal"></button>
    <button class="nav-tab" data-view="resources"></button>
  </div>

  <!-- CHAT -->
  <div class="view active" id="view-chat">
    <div id="messages">
      <div class="intro-msg">
        <p id="intro-text"></p>
        <div class="intro-divider"></div>
        <p class="disclaimer" id="disclaimer-text"></p>
      </div>
    </div>
    <div id="presence">
      <div class="candle"><div class="candle-flame"></div><div class="candle-body"></div></div>
      <span class="presence-text" id="presence-label"></span>
    </div>
    <div id="input-area">
      <div id="input-wrap">
        <button id="mic-btn" aria-label="Voice" title="">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
        </button>
        <textarea id="input" rows="1"></textarea>
        <button id="send-btn" aria-label="Send" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <button id="voice-mode-btn"><span id="voice-mode-label"></span></button>
    </div>
  </div>

  <!-- BREATHE -->
  <div class="view" id="view-breathe">
    <h2 class="breathe-title" id="breathe-title"></h2>
    <p class="breathe-sub" id="breathe-sub"></p>
    <div id="breathe-circle-wrap">
      <div id="breathe-ring"></div>
      <div id="breathe-circle"><span id="breathe-count"></span></div>
      <div id="breathe-phase"></div>
    </div>
    <div class="breathe-techniques" id="tech-row"></div>
    <p class="tech-desc" id="tech-desc"></p>
    <button id="breathe-start"></button>
  </div>

  <!-- JOURNAL -->
  <div class="view" id="view-journal">
    <div>
      <h2 class="j-section-title" id="j-today-title"></h2>
      <div class="mood-row" id="mood-row"></div>
    </div>
    <textarea id="journal-text"></textarea>
    <div class="j-audio-row">
      <button id="j-audio-btn"><span class="ja-icon">🎤</span><span id="j-audio-label"></span></button>
      <div id="j-audio-preview"></div>
    </div>
    <p class="gratitude-hint" id="gratitude-hint"></p>
    <button id="journal-save"></button>
    <div id="chart-wrap">
      <div id="chart-title"></div>
      <svg id="mood-chart" viewBox="0 0 320 120" preserveAspectRatio="none"></svg>
    </div>
    <div>
      <h2 class="j-section-title" id="j-history-title"></h2>
      <div class="entries-list" id="entries-list"></div>
    </div>
    <p id="storage-note"></p>
  </div>

  <!-- RESOURCES -->
  <div class="view" id="view-resources">
    <div class="res-section">
      <h3 id="res-sounds-title"></h3>
      <div class="sound-grid" id="sound-grid"></div>
    </div>
    <div class="res-section">
      <div class="refuge-head">
        <h3 id="res-library-title"></h3>
        <button id="library-add" aria-label="add" style="display:none">+</button>
      </div>
      <p class="library-sub" id="library-sub"></p>
      <div class="track-list" id="track-list"></div>
    </div>
    <div class="res-section">
      <h3 id="res-poems-title"></h3>

        <div class="poem-text" id="poem-text"></div>
        <div class="poem-nav">
          <button id="poem-prev">‹</button>
          <span class="poem-index" id="poem-index"></span>
          <button id="poem-next">›</button>
        </div>
      </div>
    </div>
    <div class="res-section">
      <h3 id="res-art-title"></h3>
      <div class="art-scroll" id="art-scroll"></div>
    </div>
    <div class="res-section">
      <div class="refuge-head">
        <h3 id="res-refuge-title"></h3>
        <button id="refuge-add" aria-label="add">+</button>
      </div>
      <p class="refuge-hint" id="refuge-hint"></p>
      <div class="art-scroll" id="refuge-scroll"></div>
      <input type="file" id="refuge-input" accept="image/*" capture="environment" hidden>
    </div>
    <div class="res-section">
      <h3 id="res-quote-title"></h3>
      <div class="quote-card">
        <div class="quote-text" id="quote-text"></div>
        <button class="quote-refresh" id="quote-refresh"></button>
      </div>
    </div>
  </div>
</div>

<!-- SOS -->
<div id="sos-overlay">
  <h2 class="sos-title" id="sos-title"></h2>
  <p class="sos-text" id="sos-text"></p>
  <div class="sos-actions" id="sos-actions"></div>
  <button class="sos-close" id="sos-close"></button>
</div>

<div id="lang-menu"></div>

<!-- IMAGE VIEWER -->
<div id="img-viewer">
  <button id="img-close" aria-label="close">✕</button>
  <div id="img-content"></div>
  <p id="img-caption"></p>
</div>

<!-- ADD TRACK DIALOG (admin) -->
<div id="track-dialog">
  <div id="track-dialog-box">
    <h3 id="td-title"></h3>
    <input type="text" id="td-name" placeholder="">
    <div class="td-tabs">
      <button class="td-tab active" data-mode="file" id="td-tab-file"></button>
      <button class="td-tab" data-mode="link" id="td-tab-link"></button>
    </div>
    <div id="td-file-area">
      <button id="td-pick"></button>
      <span id="td-filename"></span>
      <input type="file" id="td-file" accept="audio/*" hidden>
    </div>
    <div id="td-link-area" style="display:none">
      <input type="text" id="td-url" placeholder="https://...mp3">
      <p id="td-link-hint"></p>
    </div>
    <select id="td-type"></select>
    <div class="td-actions">
      <button id="td-cancel"></button>
      <button id="td-save"></button>
    </div>
  </div>
</div>

<!-- VOICE DIALOGUE MODE -->
<div id="voice-overlay">
  <button id="voice-exit" aria-label="Close">✕</button>
  <div id="voice-orb-wrap">
    <div id="voice-orb"></div>
    <div id="voice-orb-ring"></div>
  </div>
  <p id="voice-status"></p>
  <p id="voice-transcript"></p>
  <button id="voice-toggle"></button>
</div>

function renderLangMenu(){
  const m = $('lang-menu');
  m.innerHTML = '';
  Object.entries(LANGS).forEach(([code,info])=>{
    const b = document.createElement('button');
    b.className = 'lang-opt'+(code===lang?' active':'');
    b.textContent = info.name;
    b.onclick = ()=>{ lang = code; saveLang(); applyLang(); renderLangMenu(); m.classList.remove('visible'); };
    m.appendChild(b);
  });
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
const micBtn = $('mic-btn');

// --- VOICE MESSAGE (record real audio + transcribe) ---
let mediaRecorder = null, audioChunks = [], recStream = null, recRecognizer = null, recTranscript = '';

async function startVoiceMsg(){
  if(dictating){ stopVoiceMsg(); return; }
  // 1) request mic permission explicitly — this is what was silently failing
  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(err){
    flashMicError();
    return;
  }
  recStream = stream;
  audioChunks = []; recTranscript = '';
  // 2) record audio for a playable voice message
  let mime = '';
  ['audio/webm','audio/mp4','audio/ogg'].forEach(m=>{ if(!mime && window.MediaRecorder && MediaRecorder.isTypeSupported(m)) mime=m; });
  try{
    mediaRecorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
  }catch(e){ mediaRecorder = null; }
  if(mediaRecorder){
    mediaRecorder.ondataavailable = ev=>{ if(ev.data.size>0) audioChunks.push(ev.data); };
    mediaRecorder.onstop = onVoiceMsgStop;
    mediaRecorder.start();
  }
  // 3) transcribe in parallel (if supported) so the AI gets text
  if(SR){
    recRecognizer = new SR();
    recRecognizer.lang = SPEECH_LOCALE[lang] || 'en-US';
    recRecognizer.interimResults = true;
    recRecognizer.continuous = true;
    recRecognizer.onresult = e=>{
      let txt='';
      for(let i=0;i<e.results.length;i++) txt += e.results[i][0].transcript;
      recTranscript = txt;
    };
    recRecognizer.onerror = ()=>{};
    try{ recRecognizer.start(); }catch(e){}
  }
  dictating = true;
  micBtn.classList.add('recording');
}
function stopVoiceMsg(){
  dictating = false;
  micBtn.classList.remove('recording');
  if(recRecognizer){ try{recRecognizer.stop();}catch(e){} }
  if(mediaRecorder && mediaRecorder.state!=='inactive'){ try{mediaRecorder.stop();}catch(e){ cleanupRec(); } }
  else { cleanupRec(); if(recTranscript.trim()) sendVoiceMessage(null,recTranscript.trim()); }
}
function onVoiceMsgStop(){
  const blob = audioChunks.length ? new Blob(audioChunks,{type:audioChunks[0].type||'audio/webm'}) : null;
  const url = blob ? URL.createObjectURL(blob) : null;
  cleanupRec();
  const text = recTranscript.trim();
  if(!text && !url){ flashMicError(); return; }
  sendVoiceMessage(url,text);
}
function cleanupRec(){
  if(recStream){ recStream.getTracks().forEach(t=>t.stop()); recStream=null; }
  mediaRecorder=null; recRecognizer=null;
}
function flashMicError(){
  dictating=false; micBtn.classList.remove('recording');
  const old = inputEl.placeholder;
  inputEl.placeholder = VOICE_T[lang].vMicDenied;
  setTimeout(()=>{ inputEl.placeholder = t().placeholder; }, 3500);
}

function appendVoiceBubble(url){
  const w = document.createElement('div');
  w.className = 'msg-user msg-enter';
  if(url){
    w.innerHTML = `<div><div class="bubble voice-bubble"><button class="vb-play" aria-label="play">▶</button><div class="vb-wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><audio src="${url}" preload="metadata"></audio></div></div>`;
    const audio = w.querySelector('audio');
    const btn = w.querySelector('.vb-play');
    btn.onclick = ()=>{
      if(audio.paused){ document.querySelectorAll('#messages audio').forEach(a=>{if(a!==audio)a.pause();}); audio.play(); btn.textContent='⏸'; w.querySelector('.vb-wave').classList.add('playing'); }
      else { audio.pause(); btn.textContent='▶'; w.querySelector('.vb-wave').classList.remove('playing'); }
    };
    audio.onended = ()=>{ btn.textContent='▶'; w.querySelector('.vb-wave').classList.remove('playing'); };
  } else {
    w.innerHTML = `<div><div class="bubble voice-bubble"><span class="vb-mic">🎤</span></div></div>`;
  }
  messagesEl.appendChild(w); scrollBottom();
}

async function sendVoiceMessage(url,text){
  if(isLoading) return;
  appendVoiceBubble(url);
  if(!text){
    // no transcription available — tell the AI a voice message was sent without text
    appendAIMsg(VOICE_T[lang].vNoTranscript);
    return;
  }
  isLoading=true; updateSend();
  await new Promise(r=>setTimeout(r,250));
  presenceEl.classList.add('visible'); scrollBottom();
  try{
    const {reply,crisis} = await askAI(text);
    await new Promise(r=>setTimeout(r,1400));
    presenceEl.classList.remove('visible');
    await new Promise(r=>setTimeout(r,120));
    appendAIMsg(reply);
    if(crisis) appendCrisisCard();

    presenceEl.classList.remove('visible');
    appendAIMsg(t().errorMsg);
  }

// --- Voice dialogue mode (hands-free) ---
const voiceOverlay = $('voice-overlay'), voiceStatus = $('voice-status'), voiceTranscript = $('voice-transcript'), voiceToggle = $('voice-toggle');

function pickVoice(){
  const voices = synth ? synth.getVoices() : [];
  const loc = SPEECH_LOCALE[lang] || 'en-US';
  const code = loc.split('-')[0];
  let v = voices.find(x=>x.lang===loc && /female|femme|woman|samantha|amelie|aurélie|google/i.test(x.name))
       || voices.find(x=>x.lang===loc)
       || voices.find(x=>x.lang.startsWith(code))
       || voices[0];
  return v;
}
function speak(text){
  return new Promise(resolve=>{
    if(!synth){ resolve(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\*/g,''));
    const v = pickVoice(); if(v) u.voice=v;
    u.lang = SPEECH_LOCALE[lang] || 'en-US';
    u.rate = 0.92; u.pitch = 1.0;
    voiceOverlay.classList.add('speaking'); voiceOverlay.classList.remove('listening');
    voiceStatus.textContent = '';
    u.onend = ()=>{ voiceOverlay.classList.remove('speaking'); resolve(); };
    u.onerror = ()=>{ voiceOverlay.classList.remove('speaking'); resolve(); };
    synth.speak(u);
  });
}
async function voiceListen(){
  if(!SR){ voiceStatus.textContent = VOICE_T[lang].vUnsupported; return; }
  // ensure mic permission first
  try{ const s = await navigator.mediaDevices.getUserMedia({audio:true}); s.getTracks().forEach(t=>t.stop()); }
  catch(e){ voiceStatus.textContent = VOICE_T[lang].vMicDenied; return; }
  const rec = new SR();
  rec.lang = SPEECH_LOCALE[lang] || 'en-US';
  rec.interimResults = true; rec.continuous = false;
  let finalText = '';
  voiceListening = true;
  voiceOverlay.classList.add('listening');
  voiceStatus.textContent = VOICE_T[lang].vListening;
  voiceTranscript.textContent = '';
  voiceToggle.textContent = VOICE_T[lang].vStop;
  voiceToggle.classList.add('active');
  rec.onresult = e=>{
    let interim='';
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    voiceTranscript.textContent = finalText || interim;
  };
  rec.onerror = ()=>{ voiceListening=false; voiceOverlay.classList.remove('listening'); voiceToggle.classList.remove('active'); voiceToggle.textContent=VOICE_T[lang].vTap; };
  rec.onend = async ()=>{
    voiceListening=false;
    voiceOverlay.classList.remove('listening');
    voiceToggle.classList.remove('active');
    const text = (finalText || voiceTranscript.textContent).trim();
    if(!text || !voiceActive){ voiceToggle.textContent = VOICE_T[lang].vTap; if(voiceActive) voiceStatus.textContent=VOICE_T[lang].vStart; return; }
    appendUserMsg(text);
    voiceStatus.textContent = VOICE_T[lang].vThinking;
    voiceToggle.textContent = '…';
    try{
      const {reply,crisis} = await askAI(text);
      if(!voiceActive) return;
      appendAIMsg(reply);
      voiceTranscript.textContent = reply;
      await speak(reply);
      if(crisis){ appendCrisisCard(); }
      voiceStatus.textContent = VOICE_T[lang].vTapAgain;
      voiceToggle.textContent = VOICE_T[lang].vTap;
      if(crisis && voiceActive){ $('sos-overlay').classList.add('visible'); }
    }catch(e){
      voiceTranscript.textContent = t().errorMsg;
      voiceToggle.textContent = VOICE_T[lang].vTap;
    }
  };
  try{ rec.start(); recognition = rec; }
  catch(e){ voiceListening=false; voiceOverlay.classList.remove('listening'); }
}
function openVoiceMode(){
  if(!SR || !synth){ alert(VOICE_T[lang].vUnsupported); return; }
  voiceActive = true;
  voiceOverlay.classList.add('visible');
  voiceStatus.textContent = VOICE_T[lang].vStart;
  voiceTranscript.textContent = '';
  voiceToggle.textContent = VOICE_T[lang].vTap;
  voiceToggle.classList.remove('active');
  if(synth.getVoices().length===0){ synth.onvoiceschanged = ()=>{}; }
}
function closeVoiceMode(){
  voiceActive=false; voiceListening=false;
  if(recognition){ try{recognition.stop();}catch(e){} }
  if(synth){ synth.cancel(); }
  voiceOverlay.classList.remove('visible','listening','speaking');
}
$('voice-mode-btn').addEventListener('click',openVoiceMode);
$('voice-exit').addEventListener('click',closeVoiceMode);
voiceToggle.addEventListener('click',()=>{
  if(voiceListening){ if(recognition){try{recognition.stop();}catch(e){}} return; }
  if(synth && synth.speaking){ synth.cancel(); voiceOverlay.classList.remove('speaking'); }
  voiceListen();
});

const TECHS = {
  coherence:{phases:[['inhale',5],['exhale',5]]},
  box:{phases:[['inhale',4],['hold',4],['exhale',4],['rest',4]]},
  sleep:{phases:[['inhale',4],['hold',7],['exhale',8]]}
};
function renderTechs(){
  const row = $('tech-row'); row.innerHTML='';
  Object.keys(TECHS).forEach(k=>{
    const b = document.createElement('button');
    b.className = 'tech-btn'+(k===currentTech?' active':'');

    b.onclick = ()=>{ if(breathing) stopBreathing(); currentTech=k; renderTechs(); };
    row.appendChild(b);
  });
  $('tech-desc').textContent = t().techniques[currentTech].desc;
}
function startBreathing(){
  breathing = true;
  $('breathe-start').textContent = t().stop;
  $('breathe-start').classList.add('running');
  runPhaseLoop();
}
function stopBreathing(){
  breathing = false;
  clearTimeout(breatheTimer);
  $('breathe-start').textContent = t().start;
  $('breathe-start').classList.remove('running');
  $('breathe-phase').textContent = '';
  $('breathe-count').textContent = '';
  $('breathe-circle').style.transform = 'scale(1)';
}
function runPhaseLoop(){
  const phases = TECHS[currentTech].phases;
  let i = 0;
  function next(){
    if(!breathing) return;
    const [phase,dur] = phases[i];
    $('breathe-phase').textContent = t().phases[phase];
    const circle = $('breathe-circle');
    circle.style.transition = `transform ${dur}s cubic-bezier(.4,0,.4,1)`;
    if(phase==='inhale') circle.style.transform = 'scale(1.9)';
    else if(phase==='exhale') circle.style.transform = 'scale(1)';
    let count = dur;
    $('breathe-count').textContent = count;
    const tick = setInterval(()=>{
      count--;
      if(count<=0 || !breathing){ clearInterval(tick); }
      else $('breathe-count').textContent = count;
    },1000);
    breatheTimer = setTimeout(()=>{ i=(i+1)%phases.length; next(); },dur*1000);
  }
  next();
}
$('breathe-start').addEventListener('click',()=>{ breathing ? stopBreathing() : startBreathing(); });

  }
  // line path
  let path='', pts=[];
  days.forEach((v,i)=>{

  if(pts.length>1){

    svg.innerHTML += `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#5C5468" font-size="11" font-style="italic">— · —</text>`;
  }
}

/* ================= SOUNDS (Web Audio generative ambient) ================= */
const SOUNDS = ['rain','wind','deep','night'];
const SOUND_ICONS = {rain:'🌧',wind:'🍃',deep:'🌊',night:'🌙'};

function renderSounds(){
  const grid = $('sound-grid'); grid.innerHTML='';
  SOUNDS.forEach(s=>{
    const b = document.createElement('button');
    b.className = 'sound-card'+(activeSound===s?' playing':'');
    b.innerHTML = `<span class="sound-icon">${SOUND_ICONS[s]}</span><span class="sound-name">${t().sounds[s]}</span><span class="sound-state">${activeSound===s?t().playing:t().play}</span>`;
    b.onclick = ()=>toggleSound(s);
    grid.appendChild(b);
  });
}
function stopAllSound(){
  soundNodes.forEach(n=>{ try{n.stop?n.stop():n.disconnect();}catch(e){} });
  soundNodes=[]; activeSound=null;
}
function toggleSound(s){
  if(activeSound===s){ stopAllSound(); renderSounds(); return; }
  stopAllSound();
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const master = audioCtx.createGain();
  master.gain.value = 0; master.connect(audioCtx.destination);
  master.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime+2);
  soundNodes.push(master);

  function noise(){
    const len = audioCtx.sampleRate*2;
    const buf = audioCtx.createBuffer(1,len,audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let last=0;
    for(let i=0;i<len;i++){ const w=Math.random()*2-1; d[i]=(last+0.02*w)/1.02; last=d[i]; d[i]*=3.5; }
    const src = audioCtx.createBufferSource();
    src.buffer=buf; src.loop=true;
    return src;
  }
  if(s==='rain'){
    const n = noise();
    const f = audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2400; f.Q.value=0.4;
    const g = audioCtx.createGain(); g.gain.value=0.35;
    n.connect(f); f.connect(g); g.connect(master); n.start();
    soundNodes.push(n,f,g);
  } else if(s==='wind'){
    const n = noise();
    const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=420;
    const g = audioCtx.createGain(); g.gain.value=0.8;
    const lfo = audioCtx.createOscillator(); lfo.frequency.value=0.08;
    const lfoG = audioCtx.createGain(); lfoG.gain.value=200;
    lfo.connect(lfoG); lfoG.connect(f.frequency); lfo.start();
    n.connect(f); f.connect(g); g.connect(master); n.start();
    soundNodes.push(n,f,g,lfo,lfoG);
  } else if(s==='deep'){
    [55,82.4,110].forEach((fr,i)=>{
      const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.value=fr;
      const g = audioCtx.createGain(); g.gain.value=0.12/(i+1);
      const lfo = audioCtx.createOscillator(); lfo.frequency.value=0.05+i*0.03;
      const lg = audioCtx.createGain(); lg.gain.value=0.05;
      lfo.connect(lg); lg.connect(g.gain); lfo.start();
      o.connect(g); g.connect(master); o.start();
      soundNodes.push(o,g,lfo,lg);
    });
  } else if(s==='night'){
    const n = noise();
    const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=300;
    const g = audioCtx.createGain(); g.gain.value=0.5;
    n.connect(f); f.connect(g); g.connect(master); n.start();
    const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.value=174;
    const og = audioCtx.createGain(); og.gain.value=0.04;
    o.connect(og); og.connect(master); o.start();
    soundNodes.push(n,f,g,o,og);
  }
  activeSound = s; renderSounds();
}

/* ===== Personal refuge gallery (local, private) ===== */
let refuges = [];
async function loadRefuges(){
  try{ const r = await window.storage.get('refuge-images'); refuges = r ? JSON.parse(r.value) : []; }
  catch(e){ refuges = []; }
  renderRefuge();
}
async function saveRefuges(){
  try{ await window.storage.set('refuge-images', JSON.stringify(refuges)); }catch(e){}
}
function renderRefuge(){
  const sc = $('refuge-scroll'); if(!sc) return;
  sc.innerHTML='';
  if(refuges.length===0){
    const empty = document.createElement('button');
    empty.className='refuge-empty';
    empty.innerHTML = `<span class="re-icon">🖼️</span><span class="re-txt">${t().refugeHint.split('—')[0].trim()}</span>`;
    empty.onclick = ()=>$('refuge-input').click();
    sc.appendChild(empty);
    return;
  }
  refuges.forEach((img,idx)=>{
    const c = document.createElement('div');
    c.className='refuge-card';
    c.style.backgroundImage = `url(${img.data})`;
    c.innerHTML = `<button class="refuge-del" aria-label="del">✕</button>`;
    c.querySelector('.refuge-del').onclick = async (e)=>{ e.stopPropagation(); refuges.splice(idx,1); await saveRefuges(); renderRefuge(); };
    c.onclick = ()=>openImgViewer({src:img.data,caption:img.caption||''});
    sc.appendChild(c);
  });
}
$('refuge-add').addEventListener('click',()=>$('refuge-input').click());
$('refuge-input').addEventListener('change',async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  // downscale to keep storage light
  try{
    const dataUrl = await compressImage(file, 1200, 0.82);
    refuges.unshift({data:dataUrl, caption:'', date:Date.now()});
    if(refuges.length>40) refuges = refuges.slice(0,40);
    await saveRefuges();
    renderRefuge();
  }catch(err){}
  e.target.value='';
});
function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let {width:w,height:h} = img;
        if(w>h && w>maxDim){ h=h*maxDim/w; w=maxDim; }
        else if(h>maxDim){ w=w*maxDim/h; h=maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ===== Audio library (admin-managed) ===== */
let tracks = [], adminMode = false, libAudio = null, libPlayingId = null, tdMode = 'file', tdFileData = null;
const TYPE_ICON = {poetry:'📜',music:'🎵',nature:'🍃',voice:'🗣️'};

async function loadTracks(){
  try{ const r = await window.storage.get('audio-tracks'); tracks = r ? JSON.parse(r.value) : []; }
  catch(e){ tracks = []; }
  renderLibrary();
}
async function saveTracks(){ try{ await window.storage.set('audio-tracks', JSON.stringify(tracks)); }catch(e){} }

function renderLibrary(){
  const list = $('track-list'); if(!list) return;
  list.innerHTML='';
  if(tracks.length===0){
    list.innerHTML = `<p class="track-empty">${t().libraryEmpty}</p>`;
    return;
  }
  tracks.forEach((tr,idx)=>{
    const card = document.createElement('div');
    card.className = 'track-card'+(libPlayingId===tr.id?' playing':'');
    const typeName = (t().tdTypes&&t().tdTypes[tr.type])||tr.type||'';
    card.innerHTML = `
      <button class="track-play" aria-label="play">${libPlayingId===tr.id?'⏸':'▶'}</button>
      <div class="track-meta"><div class="track-name">${escapeHtml(tr.name)}</div><div class="track-type">${TYPE_ICON[tr.type]||'🎧'} ${typeName}</div></div>
      ${adminMode?'<button class="track-del" aria-label="del">✕</button>':''}`;
    card.querySelector('.track-play').onclick = ()=>toggleTrack(tr);
    const del = card.querySelector('.track-del');
    if(del) del.onclick = async ()=>{ if(libPlayingId===tr.id) stopTrack(); tracks.splice(idx,1); await saveTracks(); renderLibrary(); };
    list.appendChild(card);
  });
}
function stopTrack(){ if(libAudio){ libAudio.pause(); libAudio=null; } libPlayingId=null; renderLibrary(); }
function toggleTrack(tr){
  if(libPlayingId===tr.id){ stopTrack(); return; }
  if(libAudio){ libAudio.pause(); libAudio=null; }
  // stop ambient sounds if playing
  if(typeof stopAllSound==='function' && activeSound){ stopAllSound(); renderSounds(); }
  libAudio = new Audio(tr.src);
  libAudio.play().catch(()=>{});
  libAudio.onended = ()=>{ stopTrack(); };
  libAudio.onerror = ()=>{ stopTrack(); };
  libPlayingId = tr.id;
  renderLibrary();
}

$('td-file').addEventListener('change',e=>{

  reader.onload=()=>{ tdFileData=reader.result; };
  reader.readAsDataURL(f);
});
$('td-cancel').addEventListener('click',()=>tdDialog.classList.remove('visible'));
tdDialog.addEventListener('click',e=>{ if(e.target.id==='track-dialog') tdDialog.classList.remove('visible'); });
$('td-save').addEventListener('click',async ()=>{
  const name = $('td-name').value.trim() || t().tdTypes[$('td-type').value];
  const type = $('td-type').value;
  let src = null;
  if(tdMode==='file'){ if(!tdFileData) return; src = tdFileData; }
  else {
    const url = $('td-url').value.trim();
    if(!url) return;
    if(/youtube\.com|youtu\.be/i.test(url)){ $('td-link-hint').textContent = t().tdYTWarn; $('td-link-hint').style.color='var(--danger)'; return; }
    src = url;
  }
  tracks.unshift({id:Date.now()+''+Math.random().toString(36).slice(2,6), name, type, src});
  await saveTracks();
  renderLibrary();
  tdDialog.classList.remove('visible');
});
